<nav class="sticky top-0 z-50 w-full border-b border-white/10 bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 shadow-lg shadow-indigo-950/30">
    <div class="max-w-7xl mx-auto px-3 sm:px-6">
        <div class="flex min-h-14 sm:min-h-16 items-center justify-between gap-2 sm:gap-4">

            <div class="flex min-w-0 flex-1 items-center gap-2 sm:gap-4">
                <a href="{% url 'book_list' %}" class="group flex min-w-0 items-center gap-2 sm:gap-2.5 shrink-0">
                    <span class="flex h-8 w-8 sm:h-9 sm:w-9 items-center justify-center rounded-lg sm:rounded-xl bg-indigo-500/20 text-base sm:text-lg ring-1 ring-white/20 transition group-hover:bg-indigo-500/30 shrink-0">📚</span>
                    <span class="truncate text-base sm:text-xl font-bold tracking-tight text-white">
                        e<span class="font-light text-indigo-300">-</span>blioteka
                    </span>
                </a>

                {% if request.path != '/' %}
                <a href="javascript:history.back()"
                   class="inline-flex shrink-0 items-center gap-1 rounded-lg border border-white/10 bg-white/5 px-2 py-1 sm:px-3 sm:py-1.5 text-[10px] sm:text-xs font-medium text-indigo-100 transition hover:bg-white/10 hover:text-white"
                   aria-label="Назад">
                    <span aria-hidden="true">←</span>
                    <span class="hidden sm:inline">Назад</span>
                </a>
                {% endif %}
            </div>

            <div class="flex shrink-0 items-center gap-1.5 sm:gap-3">
                {% if user.is_authenticated %}
                    <a href="{% url 'profile' %}"
                       class="flex max-w-[52vw] sm:max-w-none items-center gap-1.5 sm:gap-2.5 rounded-lg sm:rounded-xl border border-white/10 bg-white/5 py-1 pl-1 pr-2 sm:py-1.5 sm:pl-1.5 sm:pr-3 transition hover:border-indigo-400/40 hover:bg-white/10"
                       title="{% if user.full_name %}{{ user.full_name }}{% else %}{{ user.username }}{% endif %}">
                        <span class="flex h-7 w-7 sm:h-8 sm:w-8 shrink-0 items-center justify-center rounded-md sm:rounded-lg bg-gradient-to-br from-indigo-400 to-violet-500 text-xs sm:text-sm font-bold text-white shadow-inner">
                            {{ user.username|slice:":1"|upper }}
                        </span>
                        <span class="hidden min-w-0 md:block text-left leading-tight">
                            <span class="block truncate text-sm font-semibold text-white max-w-[120px] lg:max-w-[180px]">
                                {% if user.full_name %}{{ user.full_name }}{% else %}{{ user.username }}{% endif %}
                            </span>
                            <span class="block text-[10px] font-medium uppercase tracking-wider text-indigo-300/90">Профиль</span>
                        </span>
                    </a>

                    <form action="{% url 'logout' %}" method="post" class="m-0">
                        {% csrf_token %}
                        <button type="submit"
                                class="rounded-lg sm:rounded-xl border border-white/15 px-2.5 py-1.5 text-[11px] sm:px-4 sm:py-2 sm:text-sm font-semibold text-indigo-100 whitespace-nowrap transition hover:border-red-400/50 hover:bg-red-500/20 hover:text-white">
                            Выйти
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}"
                       class="rounded-lg sm:rounded-xl px-2.5 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-medium text-indigo-100 whitespace-nowrap transition hover:bg-white/10 hover:text-white">
                        Войти
                    </a>
                    <a href="{% url 'register' %}"
                       class="rounded-lg sm:rounded-xl bg-white px-2.5 py-1.5 sm:px-4 sm:py-2 text-[11px] sm:text-sm font-bold text-indigo-900 shadow-md shadow-black/20 ring-1 ring-white/50 whitespace-nowrap transition hover:bg-indigo-50 hover:shadow-lg">
                        Регистрация
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
