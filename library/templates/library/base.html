{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}e-blioteka{% endblock %} — электронный каталог</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-slate-50 flex flex-col min-h-screen overflow-y-scroll">

    {% include 'partials/navbar.html' %}

    <main class="w-full max-w-7xl mx-auto mt-6 sm:mt-10 px-4 sm:px-6 pb-8 flex-grow">
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}
    {% block extra_js %}{% endblock %}
</body>
</html>
